name: sistema-reportes-intermediaria

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  generar_reporte:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Postgres Client 17
        run: |
          sudo apt update
          sudo apt install -y wget gnupg lsb-release
          sudo mkdir -p /usr/share/keyrings
          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt update
          sudo apt install -y postgresql-client-17

      - name: Generar Reporte Consolidado
        env:
          PGPASSWORD: tmiLSJC8dLiMrMh8
        run: |
          psql -h aws-0-us-west-2.pooler.supabase.com \
               -p 5432 \
               -U auditor_alertas.dodwsyjqvclcftfvklmr \
               -d postgres \
               -c "
          WITH metricas AS (
              SELECT 
                  estado_transaccion,
                  COUNT(*) as cantidad,
                  SUM(monto_comision) as total_comision,
                  fecha_registro
              FROM silver.transacciones_servicios
              GROUP BY estado_transaccion, fecha_registro
          )
          SELECT 'REPORTE DIARIO' as periodo, estado_transaccion, SUM(cantidad) as total, SUM(total_comision) as comisiones 
          FROM metricas WHERE fecha_registro > NOW() - INTERVAL '1 day' GROUP BY 1, 2
          UNION ALL
          SELECT 'REPORTE SEMANAL', estado_transaccion, SUM(cantidad), SUM(total_comision) 
          FROM metricas WHERE fecha_registro > NOW() - INTERVAL '7 days' GROUP BY 1, 2
          UNION ALL
          SELECT 'REPORTE MENSUAL', estado_transaccion, SUM(cantidad), SUM(total_comision) 
          FROM metricas WHERE fecha_registro > NOW() - INTERVAL '1 month' GROUP BY 1, 2
          UNION ALL
          SELECT 'REPORTE ANUAL', estado_transaccion, SUM(cantidad), SUM(total_comision) 
          FROM metricas WHERE fecha_registro > NOW() - INTERVAL '1 year' GROUP BY 1, 2;
          " > reporte_balance_intermediaria.txt

      - name: Verificar Alerta de Seguridad
        run: |
          # Analizamos el reporte generado para buscar fallos inusuales
          FALLOS=$(grep "REPORTE DIARIO" reporte_balance_intermediaria.txt | grep "no_exitosa" | awk '{print $3}' || echo 0)
          if [ ! -z "$FALLOS" ] && [ "$FALLOS" -gt 5 ]; then
            echo "::warning title=Alerta de Seguridad::Se detectó un volumen inusual de transacciones fallidas ($FALLOS)."
          else
            echo "Volumen de transacciones fallidas normal."
          fi

      - name: Subir Reporte Final
        uses: actions/upload-artifact@v4
        with:
          name: reporte-empresa-servicios
          path: reporte_balance_intermediaria.txt
